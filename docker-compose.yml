version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Medical Invoice & Label Extraction Agent — Docker Compose
#
# DEV  (Windows, Ollama runs NATIVELY):
#   copy .env.dev .env
#   docker compose up -d agent dashboard
#
# PROD (Linux server, Ollama runs in Docker with GPU):
#   cp .env.prod .env
#   docker compose --profile prod up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Ollama (PROD / Linux only — GPU passthrough) ───────────────────────────
  # On Windows dev, run Ollama natively instead (ollama.com/download/windows)
  # and set OLLAMA_BASE_URL=http://host.docker.internal:11434 in .env.dev
  ollama:
    image: ollama/ollama:latest
    container_name: med_ollama
    restart: unless-stopped
    profiles: ["prod"]       # Only starts with: docker compose --profile prod up
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./ollama/models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - med_net

  # ── AI Extraction Agent ───────────────────────────────────────────────────
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: med_agent
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Allows container → native Ollama on Windows/Linux
    volumes:
      - ./outputs:/app/outputs
      - ./db:/app/db
      - ./inputs:/app/inputs
      - ./logs:/app/logs
    # ── Linux PROD camera passthrough (uncomment on prod) ──
    # devices:
    #   - /dev/video0:/dev/video0
    networks:
      - med_net

  # ── Analytics Dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: med_dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./db:/app/db:ro
      - ./outputs:/app/outputs:ro
    networks:
      - med_net

networks:
  med_net:
    driver: bridge
    internal: false    # Set true for air-gap after model pull
